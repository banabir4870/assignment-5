<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyUi  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- style -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <button class="btn" onclick="my_modal_1.showModal()">open modal</button>
    <dialog id="my_modal_1" class="modal">
        <div class="modal-box">
            <div id="details-container" class="space-y-4">
                <!-- demo -->
                <h1 class="font-bold text-2xl text-[#1F2937]">Fix broken image uploads</h1>
                <p class="flex gap-1 items-center"><button
                        class="btn btn-success text-white text-sm font-normal rounded-full">Opened</button> • opened by
                    Fahim Ahmed • 22/02/26</p>
                <div>
                    <button class="btn btn-soft btn-warning rounded-full">Bug</button>
                    <button class="btn btn-soft btn-warning rounded-full">Bug</button>
                </div>
                <p class="text-[12px] text-neutral/70 line-clamp-2">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
                <div class="flex justify-start bg-gray-100 p-4 rounded-lg">
                    <div class="flex-1">
                        <h2>Assignee:</h2>
                        <p>Fahim Ahmed</p>
                    </div>
                    <div class="flex-1">
                        <h2>Priority:</h2>
                        <button class="btn btn-soft rounded-full">High</button>
                    </div>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
</body>

</html>
