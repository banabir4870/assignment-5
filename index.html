<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyUi  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- style -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <main class="w-4/12 mx-auto bg-white shadow-lg p-8 my-20">
        <div class="text-center flex flex-col justify-center items-center">
            <img class="mb-6" src="assets/github-logo.png" alt="">
            <h1 class="text-2xl font-bold text-[#1F2937]">GitHub Issues Tracker</h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div class="my-6 space-y-4">
            <div class="space-y-2">
                <h3 class="font-medium text-[#3D3746]">Username</h3>
                <input id="username-input" type="text" class="p-4 w-full rounded-lg border-gray-300" placeholder="Enter Username">
                <p class="text-sm text-[#4A00FF]">Default: admin</p>
            </div>
            <div class="space-y-2">
                <h3 class="font-medium text-[#3D3746]">Password</h3>
                <input id="pass-input" type="password" class="p-4 w-full rounded-lg border-gray-300" placeholder="Enter Password">
                <p class="text-sm text-[#4A00FF]">Default: admin123</p>
            </div>
            <button id="btn-signIn" class="btn btn-primary w-full font-semibold">Sign In</button>
        </div>
        <div class="flex justify-between gap-3 items-center">
            <hr class="border-gray-300 flex-1">
            <p>OR</p>
            <hr class="border-gray-300 flex-1">
        </div>
        <div class="my-6 text-center space-y-2">
            <h2 class="text-sm text-[#64748B]">Demo Credentials:</h2>
            <div class="bg-base-200 py-6 rounded-lg">
                <p><b>Username:</b> admin</p>
                <p><b>Password:</b> admin123</p>
            </div>
        </div>
    </main>
    <!-- script -->
     <script src="scripts/index.js"></script>
</body>

</html>
